name: CI

# Trigger the workflow on pushes and pull requests targeting the main branch.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # Ubuntu ships with a system Perl, so only Python needs an explicit setup step.
    runs-on: ubuntu-latest
    steps:
      # Check out the repository contents into the runner workspace.
      - uses: actions/checkout@v4

      # Provision a pinned Python interpreter so results are reproducible
      # across runner image updates.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install formatters
        run: |
          pip install black
          sudo apt-get update && sudo apt-get install -y perltidy

      # Show interpreter versions in the log to aid debugging
      - name: Show tool versions
        run: |
          python3 --version
          perl --version | head -2
          black --version
          perltidy --version | head -1

      # Fail-fast: sanity-check the Perl core modules used by gvp.pl are importable
      # before running the full suite — fails fast with a clear message.
      - name: Check Perl modules
        run: |
          perl -MFileHandle -MFile::Basename -MGetopt::Long -e 'print "perl modules OK\n"'

      # Fail-fast: check for the standard-library modules used by gvp.py.
      - name: Check Python modules
        run: |
          python3 -c 'import argparse, os, re, subprocess, sys; print("python modules OK")'

      # Run the shared tests against both implementations.
      - name: Run tests
        run: ./tests/run_tests.sh both
