name: CI

# Run on pushes and PRs to main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # Note:: Ubuntu ships perl; perltidy is installed alongside black.
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      # Pin Python for reproducibility across runner image updates.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Best-effort: if a formatter fails to install, dependent cases skip
      # via tests/cases/*/requires/<mode> instead of failing the job.
      - name: Install formatters
        continue-on-error: true
        run: |
          python3 -m pip install --upgrade pip || true
          python3 -m pip install black || true
          sudo apt-get update && sudo apt-get install -y perltidy || true

      # Report tool versions; missing formatters are noted, not enforced.
      - name: Show tool versions
        run: |
          python3 --version
          perl --version | head -2
          if command -v black >/dev/null 2>&1; then
              black --version
          else
              echo "black not installed (cases requiring it will skip)"
          fi
          if command -v perltidy >/dev/null 2>&1; then
              perltidy --version | head -1
          else
              echo "perltidy not installed (cases requiring it will skip)"
          fi

      # Fail fast if gvp.pl's core modules are missing.
      - name: Check Perl modules
        run: |
          perl -MFileHandle -MFile::Basename -MGetopt::Long -e 'print "perl modules OK\n"'

      # Fail fast if gvp.py's stdlib modules are missing.
      - name: Check Python modules
        run: |
          python3 -c 'import argparse, os, re, subprocess, sys; print("python modules OK")'

      - name: Run tests
        run: ./tests/run_tests.sh both
